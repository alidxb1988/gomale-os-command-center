<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOMALE OS - Backtest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0e1a; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); }
        .progress-bar { background: linear-gradient(90deg, #3b82f6, #06b6d4); }
    </style>
</head>
<body class="text-white min-h-screen">
    <!-- Header -->
    <header class="glass border-b border-blue-500/20 sticky top-0 z-50">
        <div class="px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#1E3A5F] to-[#3b82f6] flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">GOMALE OS</h1>
                        <p class="text-blue-400 text-xs">AI Trading Command Center</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="bg-[#111827]/50 border-b border-white/5 px-6">
        <div class="flex gap-1">
            <a href="frontend-preview.html" class="flex items-center gap-2 px-6 py-4 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-white">Dashboard</a>
            <a href="trading-deck.html" class="flex items-center gap-2 px-6 py-4 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-white">Trading Deck</a>
            <a href="ai-chat.html" class="flex items-center gap-2 px-6 py-4 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-white">AI Chat</a>
            <button class="flex items-center gap-2 px-6 py-4 text-sm font-medium text-blue-400 border-b-2 border-blue-400 bg-blue-500/10">Backtest</button>
            <a href="agents.html" class="flex items-center gap-2 px-6 py-4 text-sm font-medium text-gray-400 border-b-2 border-transparent hover:text-white">Agents</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="p-6 max-w-[1600px] mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Configuration Panel -->
            <div class="lg:col-span-1 bg-[#1a1f2e] rounded-2xl border border-white/10 p-6">
                <h3 class="text-white font-bold mb-6 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    Backtest Config
                </h3>

                <div class="space-y-5">
                    <div>
                        <label class="text-gray-400 text-sm mb-2 block">Starting Capital</label>
                        <input type="number" value="1000" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white">
                    </div>

                    <div>
                        <label class="text-gray-400 text-sm mb-2 block">Symbol</label>
                        <select class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white">
                            <option>SOL</option>
                            <option>ETH</option>
                            <option>BTC</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-gray-400 text-sm mb-2 block">Timeframe</label>
                        <select class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white">
                            <option>6 months</option>
                            <option>3 months</option>
                            <option>1 month</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-gray-400 text-sm mb-2 block">Risk Per Trade (%)</label>
                        <input type="number" value="10" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white">
                    </div>

                    <div class="space-y-3 pt-4 border-t border-white/10">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" checked class="w-5 h-5 rounded border-gray-600">
                            <span class="text-gray-300">Use Claude AI</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" checked class="w-5 h-5 rounded border-gray-600">
                            <span class="text-gray-300">Perplexity News</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" checked class="w-5 h-5 rounded border-gray-600">
                            <span class="text-gray-300">Polymarket Data</span>
                        </label>
                    </div>

                    <button class="w-full py-4 bg-green-600 hover:bg-green-700 rounded-xl font-bold transition-all">
                        Run Backtest
                    </button>
                </div>
            </div>

            <!-- Results Area -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Summary Stats -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-[#1a1f2e] rounded-xl p-4 border border-white/10">
                        <span class="text-gray-400 text-xs">Total Return</span>
                        <div class="text-2xl font-bold text-green-400">+24.5%</div>
                    </div>
                    <div class="bg-[#1a1f2e] rounded-xl p-4 border border-white/10">
                        <span class="text-gray-400 text-xs">Sharpe Ratio</span>
                        <div class="text-2xl font-bold text-white">1.84</div>
                    </div>
                    <div class="bg-[#1a1f2e] rounded-xl p-4 border border-white/10">
                        <span class="text-gray-400 text-xs">Max Drawdown</span>
                        <div class="text-2xl font-bold text-red-400">-8.2%</div>
                    </div>
                    <div class="bg-[#1a1f2e] rounded-xl p-4 border border-white/10">
                        <span class="text-gray-400 text-xs">Win Rate</span>
                        <div class="text-2xl font-bold text-white">68%</div>
                    </div>
                </div>

                <!-- Chart Placeholder -->
                <div class="bg-[#1a1f2e] rounded-2xl border border-white/10 p-6 h-[400px] flex items-center justify-center">
                    <div class="text-center">
                        <svg class="w-16 h-16 mx-auto mb-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        <p class="text-gray-500">Equity Curve Chart</p>
                        <p class="text-gray-600 text-sm">Run backtest to see results</p>
                    </div>
                </div>

                <!-- Trade List -->
                <div class="bg-[#1a1f2e] rounded-2xl border border-white/10 p-6">
                    <h3 class="text-white font-bold mb-4">Simulated Trades</h3>
                    <div class="text-center py-8 text-gray-500">
                        <p>No backtest results yet</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
